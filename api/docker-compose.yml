services:
  goalxi-api:
    image: goalxi-api
    container_name: goalxi-api
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs/api
    networks:
      - goalxi-network

  goalxi-simulator:
    image: goalxi-simulator
    container_name: goalxi-simulator
    restart: always
    build:
      context: ../simulator
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    volumes:
      - ../simulator/logs:/app/logs/simulator
    depends_on:
      - db
      - redis
    networks:
      - goalxi-network

  goalxi-settlement:
    image: goalxi-settlement
    container_name: goalxi-settlement
    restart: always
    build:
      context: ../settlement
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    volumes:
      - ../settlement/logs:/app/logs/settlement
    depends_on:
      - db
      - redis
    networks:
      - goalxi-network

  goalxi-web:
    image: goalxi-web
    container_name: goalxi-web
    restart: always
    build:
      context: ../web
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ../web/logs:/app/logs/web
    depends_on:
      - goalxi-api
    networks:
      - goalxi-network

  db:
    image: postgres:16
    container_name: goalxi-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: "UTC"
    ports:
      - "25432:5432"
    networks:
      - goalxi-network

  redis:
    image: redis/redis-stack:latest
    container_name: goalxi-redis
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
    environment:
      REDIS_ARGS: "--requirepass redispass"
    networks:
      - goalxi-network

  maildev:
    build:
      context: .
      dockerfile: maildev.Dockerfile
    ports:
      - ${MAIL_CLIENT_PORT}:1080
      - ${MAIL_PORT}:1025
    networks:
      - goalxi-network

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    ports:
      - "18080:80"
    volumes:
      - pgadmin_data:/root/.pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: 12345678
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: "False"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    networks:
      - goalxi-network

  vector:
    image: timberio/vector:0.41.1-alpine
    container_name: goalxi-vector
    user: root
    volumes:
      - ./logs:/app/logs/api:ro
      - ../settlement/logs:/app/logs/settlement:ro
      - ../simulator/logs:/app/logs/simulator:ro
      - ../web/logs:/app/logs/web:ro
      - ../vector.toml:/etc/vector/vector.toml:ro
    command: ["--config", "/etc/vector/vector.toml"] # 必须加这一行
    depends_on:
      - openobserve
    networks:
      - goalxi-network
    restart: unless-stopped

  openobserve:
    image: openobserve/openobserve:v0.15.0
    container_name: goalxi-openobserve
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@goalxi.com
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_PASSWORD:-changeme}
      - ZO_DATA_DIR=/data
    volumes:
      - openobserve_data:/data
    networks:
      - goalxi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5080/healthz || wget -q --spider http://localhost:5080/healthz || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  openobserve_data:


networks:
  api_goalxi-network:
