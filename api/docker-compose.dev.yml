version: '3.8'

# GoalXI Development Infrastructure
# Usage: docker compose -f docker-compose.dev.yml up -d
# Note: db and redis should already be running from the main docker-compose.yml

services:
  vector:
    image: timberio/vector:0.41.1-alpine
    container_name: goalxi-vector-dev
    volumes:
      - ./logs:/app/logs/api:ro
      - ../settlement/logs:/app/logs/settlement:ro
      - ../simulator/logs:/app/logs/simulator:ro
      - ../web/logs:/app/logs/web:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    depends_on:
      openobserve:
        condition: service_healthy
    networks:
      - goalxi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  openobserve:
    image: openobserve/openobserve:v0.15.0
    container_name: goalxi-openobserve-dev
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@goalxi.com
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_PASSWORD:-changeme}
      - ZO_DATA_DIR=/data
    volumes:
      - openobserve_data:/data
    networks:
      - goalxi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  openobserve_data:

networks:
  goalxi-network:
    driver: bridge
